<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>az10b — Security Research</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0f;
            color: #c9d1d9;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            line-height: 1.6;
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 65, 0.015) 2px,
                rgba(0, 255, 65, 0.015) 4px
            );
            z-index: 1000;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 24px;
        }

        .header {
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 2.4rem;
            color: #00ff41;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
        }

        .header .subtitle {
            color: #6e7681;
            font-size: 1rem;
        }

        .header .links {
            margin-top: 16px;
        }

        .header .links a {
            color: #58a6ff;
            text-decoration: none;
            margin-right: 20px;
            font-size: 0.9rem;
        }

        .header .links a:hover {
            color: #00ff41;
        }

        .section {
            margin-bottom: 50px;
        }

        .section h2 {
            font-size: 1.1rem;
            color: #00ff41;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 1px solid #1a1a2e;
        }

        .section h2::before {
            content: '> ';
            opacity: 0.5;
        }

        .cve-table {
            width: 100%;
            border-collapse: collapse;
        }

        .cve-table th {
            text-align: left;
            padding: 12px 16px;
            background: #111118;
            color: #00ff41;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #1a1a2e;
        }

        .cve-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #111118;
            font-size: 0.85rem;
        }

        .cve-table tr:hover {
            background: rgba(0, 255, 65, 0.03);
        }

        .severity-critical {
            color: #ff4444;
            font-weight: bold;
        }

        .severity-high {
            color: #ff8c00;
            font-weight: bold;
        }

        .severity-medium {
            color: #ffcc00;
            font-weight: bold;
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.75rem;
            background: rgba(0, 255, 65, 0.1);
            color: #00ff41;
            border: 1px solid rgba(0, 255, 65, 0.2);
        }

        .tag.xss { background: rgba(255, 68, 68, 0.1); color: #ff4444; border-color: rgba(255, 68, 68, 0.2); }
        .tag.idor { background: rgba(255, 140, 0, 0.1); color: #ff8c00; border-color: rgba(255, 140, 0, 0.2); }
        .tag.rce { background: rgba(255, 0, 0, 0.1); color: #ff0000; border-color: rgba(255, 0, 0, 0.2); }
        .tag.cors { background: rgba(88, 166, 255, 0.1); color: #58a6ff; border-color: rgba(88, 166, 255, 0.2); }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 50px;
        }

        .stat-card {
            background: #111118;
            border: 1px solid #1a1a2e;
            border-radius: 6px;
            padding: 24px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 2rem;
            color: #00ff41;
            text-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
        }

        .stat-card .label {
            font-size: 0.8rem;
            color: #6e7681;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .pr-link {
            color: #58a6ff;
            text-decoration: none;
        }

        .pr-link:hover {
            color: #00ff41;
        }

        .footer {
            margin-top: 80px;
            padding-top: 20px;
            border-top: 1px solid #1a1a2e;
            color: #6e7681;
            font-size: 0.8rem;
        }

        .blink {
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        @media (max-width: 600px) {
            .stats { grid-template-columns: 1fr; }
            .cve-table { font-size: 0.75rem; }
            .cve-table th, .cve-table td { padding: 8px; }
            .header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <div class="container">
        <div class="header">
            <h1>az10b<span class="blink">_</span></h1>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="number">4</div>
                <div class="label">Vulnerabilities</div>
            </div>
            <div class="stat-card">
                <div class="number">3</div>
                <div class="label">Projects Secured</div>
            </div>
            <div class="stat-card">
                <div class="number">2</div>
                <div class="label">Fix PRs Merged</div>
            </div>
        </div>

        <div class="section">
            <h2>CVE Disclosures</h2>
            <table class="cve-table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Type</th>
                        <th>Severity</th>
                        <th>Fix</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><a class="pr-link" href="https://github.com/az10b/security-advisories/blob/main/stored_xss_linkstack.md">LinkStack v4.8.6</a></td>
                        <td><span class="tag xss">Stored XSS</span></td>
                        <td class="severity-high">8.7 High</td>
                        <td><a class="pr-link" href="https://github.com/LinkStackOrg/LinkStack/pull/974">#974</a></td>
                    </tr>
                    <tr>
                        <td><a class="pr-link" href="https://github.com/az10b/security-advisories/blob/main/idor_linkstack.md">LinkStack v4.8.6</a></td>
                        <td><span class="tag idor">IDOR</span></td>
                        <td class="severity-high">8.1 High</td>
                        <td><a class="pr-link" href="https://github.com/LinkStackOrg/LinkStack/pull/975">#975</a></td>
                    </tr>
                    <tr>
                        <td><a class="pr-link" href="https://github.com/az10b/security-advisories/blob/main/rce_MeTube.md">MeTube v2026.04.09</a></td>
                        <td><span class="tag rce">RCE</span></td>
                        <td class="severity-critical">9.6 Critical</td>
                        <td><a class="pr-link" href="https://github.com/alexta69/metube/pull/950">#950</a></td>
                    </tr>
                    <tr>
                        <td><a class="pr-link" href="https://github.com/az10b/security-advisories/blob/main/cors_MeTube.md">MeTube v2026.04.09</a></td>
                        <td><span class="tag cors">CORS Bypass</span></td>
                        <td class="severity-critical">9.6 Critical</td>
                        <td><a class="pr-link" href="https://github.com/alexta69/metube/pull/949">#949</a></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="footer">
            <p>az10b &copy; 2026</p>
        </div>
    </div>
</body>
</html>
